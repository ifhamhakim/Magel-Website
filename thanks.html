<style>
:root{--black:#0B0B0C;--paper:#FBFAF7;--orange:#E9741A;--orange-2:#F0872F;--muted-d:rgba(255,255,255,.56);
  --display:"Clash Display",system-ui,sans-serif;--body:"Switzer",system-ui,sans-serif;--ease:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box}
body{margin:0;min-height:100svh;display:flex;align-items:center;justify-content:center;
  background:var(--black);color:#fff;font-family:var(--body);text-align:center;padding:2rem}
.wrap{max-width:560px}
.logo{height:34px;width:auto;margin:0 auto 2.5rem;display:block}
.mark{font-family:"Space Mono",monospace;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--orange-2)}
h1{font-family:var(--display);font-weight:600;font-size:clamp(2rem,6vw,3.2rem);letter-spacing:-.02em;line-height:1.05;margin:.9rem 0 1.1rem}
p{color:var(--muted-d);line-height:1.65;margin:0 0 2.2rem}
.btns{display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:.6em;font-weight:600;font-size:.95rem;
  padding:1rem 1.6rem;border-radius:8px;text-decoration:none;transition:transform .35s var(--ease)}
.btn:hover{transform:translateY(-2px)}
.btn--primary{background:var(--orange);color:#fff}
.btn--ghost{border:1px solid rgba(255,255,255,.3);color:#fff}
.btn--ghost:hover{border-color:#fff}

<body>

  <div class="btns">

  </div>
